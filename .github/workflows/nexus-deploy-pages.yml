# Pushes the NEXUS/ folder to jordanz00/nexus-music-visualizer (gh-pages) so
# GitHub Pages can serve https://jordanz00.github.io/nexus-music-visualizer/
#
# Setup (once): create a fine-grained PAT with Contents: Read+Write on repo
# jordanz00/nexus-music-visualizer, add as repository secret:
#   NEXUS_MUSIC_VISUALIZER_DEPLOY_PAT
#
# Target repo Pages: Settings → Pages → Build from branch → gh-pages → / (root)

name: Deploy NEXUS to nexus-music-visualizer

on:
  push:
    branches: [main]
    paths:
      - "NEXUS/**"
      - ".github/workflows/nexus-deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-nexus-pages:
    name: Sync NEXUS → external Pages repo
    runs-on: ubuntu-latest
    if: github.repository == 'jordanz00/340b-dashboard' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy NEXUS folder to jordanz00/nexus-music-visualizer (gh-pages)
        if: ${{ secrets.NEXUS_MUSIC_VISUALIZER_DEPLOY_PAT != '' }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.NEXUS_MUSIC_VISUALIZER_DEPLOY_PAT }}
          external_repository: jordanz00/nexus-music-visualizer
          publish_branch: gh-pages
          publish_dir: ./NEXUS
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "deploy: sync NEXUS from 340b-dashboard ${{ github.sha }}"

      - name: Deploy token not configured
        if: ${{ secrets.NEXUS_MUSIC_VISUALIZER_DEPLOY_PAT == '' }}
        run: |
          echo "::notice::Skipped NEXUS deploy — add repo secret NEXUS_MUSIC_VISUALIZER_DEPLOY_PAT (see NEXUS/DEPLOY.md)."
