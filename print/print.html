<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=../print.html">
  <title>Redirecting to canonical print view</title>
</head>
<body>
  <p>Redirecting to the canonical print view...</p>
  <p><a href="../print.html">Open print view</a></p>
  <script>
    (function () {
      var query = window.location.search || "";
      var hash = window.location.hash || "";
      window.location.replace("../print.html" + query + hash);
    })();
  </script>
</body>
</html>
